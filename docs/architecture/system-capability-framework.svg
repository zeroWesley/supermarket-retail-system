<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1060" viewBox="0 0 1800 1060">
  <defs>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.35" fill="#d8dde7"/>
    </pattern>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8d6"/>
      <stop offset="0.5" stop-color="#f8fff9"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#111827" flood-opacity="0.09"/>
    </filter>
    <style>
      .title { font: 900 38px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .topText { font: 900 24px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .layerText { font: 900 26px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; }
      .sectionText { font: 900 28px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .cardTitle { font: 900 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .tagText { font: 900 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #273142; }
      .badgeText { font: 900 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #166534; }
    </style>
  </defs>

  <rect width="1800" height="1060" rx="34" fill="#ffffff"/>
  <rect x="18" y="18" width="1764" height="1024" rx="30" fill="url(#dotGrid)"/>
  <rect x="72" y="70" width="1656" height="920" rx="30" fill="url(#pageBg)" stroke="#e6eaf1" stroke-width="2" filter="url(#softShadow)"/>

  <text x="122" y="130" class="title">Zero便利超市 · 系统核心能力框架</text>
  <text x="122" y="166" class="subtitle">单超市多门店 · 员工自配送 · 后台配置同步到 C端与员工端</text>
  <rect x="1430" y="98" width="178" height="44" rx="22" fill="#dcfce7"/>
  <text x="1468" y="126" class="badgeText">MVP 能力总览</text>

  <!-- Top modules -->
  <g>
    <rect x="300" y="215" width="230" height="72" rx="6" fill="#354052"/>
    <text x="360" y="260" class="topText">C端小程序</text>

    <rect x="558" y="215" width="230" height="72" rx="6" fill="#354052"/>
    <text x="618" y="260" class="topText">员工小程序</text>

    <rect x="816" y="215" width="230" height="72" rx="6" fill="#354052"/>
    <text x="870" y="260" class="topText">网页运营端</text>

    <rect x="1074" y="215" width="230" height="72" rx="6" fill="#354052"/>
    <text x="1128" y="260" class="topText">网页管理端</text>

    <rect x="1332" y="215" width="230" height="72" rx="6" fill="#354052"/>
    <text x="1383" y="260" class="topText">原型展示页</text>
  </g>

  <!-- Left layers -->
  <g>
    <rect x="122" y="330" width="132" height="178" rx="8" fill="#ffe16a"/>
    <text x="148" y="431" class="layerText">应用层</text>

    <rect x="122" y="570" width="132" height="168" rx="8" fill="#b7a5ff"/>
    <text x="148" y="667" class="layerText">业务层</text>

    <rect x="122" y="800" width="132" height="116" rx="8" fill="#ff9bea"/>
    <text x="145" y="869" class="layerText">数据层</text>
  </g>

  <!-- Application layer cards -->
  <g filter="url(#softShadow)">
    <rect x="300" y="330" width="230" height="178" rx="18" fill="#ffffff"/>
    <text x="334" y="372" class="cardTitle">用户购物</text>
    <rect x="326" y="402" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="356" y="427" class="tagText">首页活动</text>
    <rect x="326" y="452" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="356" y="477" class="tagText">酒单商品</text>

    <rect x="558" y="330" width="230" height="178" rx="18" fill="#ffffff"/>
    <text x="592" y="372" class="cardTitle">门店履约</text>
    <rect x="584" y="402" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="632" y="427" class="tagText">扫码入库</text>
    <rect x="584" y="452" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="614" y="477" class="tagText">接单配送</text>

    <rect x="816" y="330" width="230" height="178" rx="18" fill="#ffffff"/>
    <text x="850" y="372" class="cardTitle">运营配置</text>
    <rect x="842" y="402" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="881" y="427" class="tagText">商品库存</text>
    <rect x="842" y="452" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="872" y="477" class="tagText">活动订单</text>

    <rect x="1074" y="330" width="230" height="178" rx="18" fill="#ffffff"/>
    <text x="1108" y="372" class="cardTitle">管理后台</text>
    <rect x="1100" y="402" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="1139" y="427" class="tagText">账号管理</text>
    <rect x="1100" y="452" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="1139" y="477" class="tagText">菜单权限</text>

    <rect x="1332" y="330" width="230" height="178" rx="18" fill="#ffffff"/>
    <text x="1366" y="372" class="cardTitle">原型入口</text>
    <rect x="1358" y="402" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="1397" y="427" class="tagText">项目总览</text>
    <rect x="1358" y="452" width="178" height="38" rx="8" fill="#fff2ba"/>
    <text x="1397" y="477" class="tagText">入口聚合</text>
  </g>

  <!-- Business layer -->
  <rect x="300" y="570" width="1262" height="168" rx="18" fill="#f4f5f7" stroke="#d9dee8" stroke-width="2"/>
  <text x="864" y="620" class="sectionText">核心业务能力</text>

  <g>
    <rect x="348" y="660" width="176" height="58" rx="9" fill="#ffe07a"/>
    <text x="396" y="696" class="tagText">商品管理</text>

    <rect x="560" y="660" width="176" height="58" rx="9" fill="#ffe07a"/>
    <text x="608" y="696" class="tagText">库存管理</text>

    <rect x="772" y="660" width="176" height="58" rx="9" fill="#ffe07a"/>
    <text x="821" y="696" class="tagText">优惠券</text>

    <rect x="984" y="660" width="176" height="58" rx="9" fill="#ffe07a"/>
    <text x="1032" y="696" class="tagText">活动投放</text>

    <rect x="1196" y="660" width="176" height="58" rx="9" fill="#ffe07a"/>
    <text x="1244" y="696" class="tagText">订单履约</text>

    <rect x="1408" y="660" width="106" height="58" rx="9" fill="#ffe07a"/>
    <text x="1425" y="696" class="tagText">门店</text>
  </g>

  <!-- Data layer -->
  <rect x="300" y="800" width="1262" height="116" rx="18" fill="#fdf2fb" stroke="#f0aee7" stroke-width="2"/>
  <text x="338" y="870" class="sectionText">API 与数据同步</text>

  <g>
    <rect x="596" y="830" width="156" height="52" rx="9" fill="#ff8be7"/>
    <text x="631" y="863" class="tagText">商品数据</text>

    <rect x="784" y="830" width="156" height="52" rx="9" fill="#ff8be7"/>
    <text x="819" y="863" class="tagText">活动券</text>

    <rect x="972" y="830" width="156" height="52" rx="9" fill="#ff8be7"/>
    <text x="1007" y="863" class="tagText">订单数据</text>

    <rect x="1160" y="830" width="156" height="52" rx="9" fill="#ff8be7"/>
    <text x="1195" y="863" class="tagText">门店数据</text>

    <rect x="1348" y="830" width="156" height="52" rx="9" fill="#ff8be7"/>
    <text x="1383" y="863" class="tagText">权限数据</text>
  </g>

  <!-- Relation summary -->
  <g>
    <rect x="300" y="948" width="290" height="34" rx="17" fill="#dcfce7"/>
    <text x="352" y="971" class="badgeText">后台配置 → C端展示</text>

    <rect x="626" y="948" width="330" height="34" rx="17" fill="#dcfce7"/>
    <text x="672" y="971" class="badgeText">C端下单 → 员工履约</text>

    <rect x="992" y="948" width="344" height="34" rx="17" fill="#dcfce7"/>
    <text x="1032" y="971" class="badgeText">员工操作 → 库存与订单同步</text>

    <rect x="1372" y="948" width="190" height="34" rx="17" fill="#dcfce7"/>
    <text x="1402" y="971" class="badgeText">原型统一入口</text>
  </g>
</svg>
