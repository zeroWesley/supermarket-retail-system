<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zero便利超市后台</title>
  <link rel="stylesheet" href="styles.css?v=11666ce-2">
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="brand entry-brand">
        <div class="brand-mark">Z</div>
        <div>
          <strong>Zero便利超市</strong>
          <span>后台登录</span>
        </div>
      </div>
      <h1>登录后台</h1>
      <p>使用演示账号登录，系统会根据账号权限展示对应后台和菜单。</p>
      <form id="loginForm" class="login-form">
        <label>
          账号
          <input class="input" name="username" value="admin" autocomplete="username">
        </label>
        <label>
          密码
          <input class="input" name="password" value="admin123" type="password" autocomplete="current-password">
        </label>
        <button class="primary">登录</button>
      </form>
      <div class="demo-accounts">
        <button data-fill-login="admin">管理员：admin / admin123</button>
        <button data-fill-login="operator">运营人员：operator / ops123</button>
      </div>
    </div>
  </section>

  <section class="entry-screen hidden" id="entryScreen">
    <div class="entry-card">
      <div class="brand entry-brand">
        <div class="brand-mark">Z</div>
        <div>
          <strong>Zero便利超市</strong>
          <span>后台工作台</span>
        </div>
      </div>
      <span class="store-pill" id="entryUserLabel">当前登录：系统管理员</span>
      <h1>请选择进入的后台</h1>
      <p>检测到当前管理员账号拥有全部后台权限，可按本次工作目标选择入口。</p>
      <div class="entry-grid">
        <button class="entry-option" data-entry-role="operate">
          <strong>进入运营端</strong>
          <span>经营概览、商品库存、活动配置、订单和门店</span>
        </button>
        <button class="entry-option" data-entry-role="manage">
          <strong>进入管理端</strong>
          <span>仅系统管理员可进入，包含账号管理、角色权限、操作日志</span>
        </button>
      </div>
    </div>
  </section>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">Z</div>
        <div>
          <strong>Zero便利超市</strong>
          <span>管理运营后台</span>
        </div>
      </div>

      <div class="role-switch">
        <button class="role-btn active" data-role="operate">运营端</button>
        <button class="role-btn" data-role="manage">管理端</button>
      </div>

      <nav class="nav-group nav-operate">
        <button class="nav-btn active" data-page="dashboard">经营概览</button>
        <button class="nav-btn" data-page="products">商品管理</button>
        <button class="nav-btn" data-page="inventory">库存管理</button>
        <button class="nav-btn" data-page="promotions">营销活动</button>
        <button class="nav-btn" data-page="orders">订单管理</button>
        <button class="nav-btn" data-page="stores">门店配置</button>
      </nav>

      <nav class="nav-group nav-manage hidden">
        <button class="nav-btn" data-page="accounts">账号管理</button>
        <button class="nav-btn" data-page="permissions">角色权限</button>
        <button class="nav-btn" data-page="logs">操作日志</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">经营概览</h1>
          <p id="pageDesc">查看门店经营、订单履约、库存预警和活动效果。</p>
        </div>
        <div class="top-actions">
          <span class="store-pill" id="currentUserLabel">未登录</span>
          <span class="store-pill">城南店</span>
          <button class="secondary" id="backEntryBtn">返回入口</button>
          <button class="secondary" id="logoutBtn">退出登录</button>
          <button class="secondary" id="resetDataBtn">重置演示数据</button>
        </div>
      </header>

      <section id="content"></section>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="modalTitle">新增</h2>
        <button class="icon-btn" id="closeModalBtn">×</button>
      </div>
      <form id="modalForm" class="modal-body"></form>
    </div>
  </div>

  <div class="toast" id="toast">已保存</div>

  <script src="app.js?v=11666ce-2"></script>
</body>
</html>
