<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Zero便利超市原型入口</title>
  <style>
    :root {
      --brand: #13b66b;
      --brand-dark: #07854d;
      --ink: #111827;
      --muted: #667085;
      --line: #e7ebf0;
      --bg: #f5f7fa;
      --panel: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 22px 54px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 800;
    }

    .btn.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(20, 28, 39, .07);
    }

    .card-head {
      padding: 18px 18px 14px;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eafaf2;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .preview {
      height: 330px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    iframe {
      width: 1280px;
      height: 860px;
      border: 0;
      transform: scale(.39);
      transform-origin: top left;
      pointer-events: none;
      background: #fff;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 18px;
      align-items: center;
    }

    .meta-list {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .full {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 22px;
      background: #101827;
      color: #fff;
      border-radius: 16px;
    }

    .full h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .full p {
      margin: 0;
      color: #aeb8c8;
      line-height: 1.6;
    }

    .full .btn {
      border: 0;
    }

    @media (max-width: 900px) {
      header { display: block; }
      .top-actions { justify-content: flex-start; margin-top: 14px; }
      .grid { grid-template-columns: 1fr; }
      .actions { align-items: flex-start; flex-direction: column; }
      .full { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>原型与演示入口</h1>
        <p class="sub">按模块进入不同端的原型或可操作后台，用于线下查看和演示。</p>
      </div>
      <div class="top-actions">
        <a class="btn" href="../index.html">能力首页</a>
        <a class="btn primary" href="../admin-web/index.html">后台演示</a>
      </div>
    </header>

    <section class="grid" id="cards"></section>

    <section class="full">
      <div>
        <h2>完整原型总览</h2>
        <p>打开后可在左侧切换全部模块，适合一次性完整演示。</p>
      </div>
      <a class="btn primary" href="../prototype/index.html" target="_blank" rel="noreferrer">进入完整原型</a>
    </section>
  </main>

  <script>
    const projects = [
      {
        title: 'C端用户小程序',
        tag: '用户购物',
        desc: '绿色品牌基调，参考送酒类小程序的紧凑卡片、胶囊按钮和分类导航，覆盖购物、下单、会员卡片和会员中心。',
        path: '../prototype/index.html?mode=app',
        action: '进入C端原型',
        meta: 'AppID：wx96dae1169f62c178'
      },
      {
        title: '员工端小程序',
        tag: '履约配送',
        desc: '商品扫码入库、订单接单、拣货出库、配送地图、确认送达和历史配送查询。',
        path: '../prototype/index.html?mode=staff',
        action: '进入员工端原型',
        meta: 'AppID：wx1d0c7b230e8730dc'
      },
      {
        title: '网页运营端',
        tag: '运营配置',
        desc: '经营概览、商品库存合并管理、优惠券配置、活动投放、会员体系、订单管理和门店配置。',
        path: '../prototype/index.html?mode=operate',
        action: '进入运营端原型',
        meta: '原型展示'
      },
      {
        title: '网页管理端',
        tag: '账号权限',
        desc: '管理员入口、账号添加删除、运营菜单权限分配和操作日志。',
        path: '../prototype/index.html?mode=manage',
        action: '进入管理端原型',
        meta: '原型展示'
      },
      {
        title: '可操作网页后台',
        tag: '真实演示',
        desc: '管理端与运营端共用后台，支持商品库存、优惠券、活动投放、会员体系、订单和权限演示。',
        path: '../admin-web/index.html',
        action: '进入后台应用',
        meta: '管理员：admin / admin123；运营：operator / ops123'
      },
      {
        title: '能力框架图',
        tag: '能力全景',
        desc: '展示各小程序、后台、业务能力与数据同步层的整体关系。',
        path: '../architecture/system-capability-framework.svg',
        action: '打开框架图',
        meta: '适合放入后台首页或方案说明'
      }
    ];

    const cards = document.getElementById('cards');
    cards.innerHTML = projects.map(project => `
      <article class="card">
        <div class="card-head">
          <div>
            <h2>${project.title}</h2>
            <p>${project.desc}</p>
          </div>
          <span class="tag">${project.tag}</span>
        </div>
        <div class="preview">
          <iframe src="${project.path}" title="${project.title}预览"></iframe>
        </div>
        <div class="actions">
          <div class="meta-list">${project.meta}</div>
          <a class="btn primary" href="${project.path}" target="_blank" rel="noreferrer">${project.action}</a>
        </div>
      </article>
    `).join('');
  </script>
</body>
</html>
