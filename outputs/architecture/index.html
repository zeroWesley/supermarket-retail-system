<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zero便利超市能力框架图</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        background: #f3f5f9;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }

      .wrap {
        max-width: 1480px;
        margin: 0 auto;
      }

      .head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 8px 0 0;
        color: #667085;
      }

      .badge {
        flex: 0 0 auto;
        padding: 9px 14px;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        font-weight: 800;
      }

      .canvas {
        overflow: auto;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(17, 24, 39, 0.12);
      }

      img {
        display: block;
        width: 100%;
        min-width: 1180px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="head">
        <div>
          <h1>Zero便利超市能力框架图</h1>
          <p>用于后台首页、原型介绍页或后续方案说明。</p>
        </div>
        <div class="badge">MVP能力总览</div>
      </div>
      <div class="canvas">
        <img src="./system-capability-framework.svg" alt="Zero便利超市能力框架图" />
      </div>
    </main>
  </body>
</html>
